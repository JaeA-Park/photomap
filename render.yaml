services:
  - type: web
    name: photo-map
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DB_PATH
        value: /data/photos.json
    disk:
      name: photos-db
      mountPath: /data
      sizeGB: 1
