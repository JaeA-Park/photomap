<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Photo Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f5; height: 100dvh; display: flex; flex-direction: column; }

    header {
      background: #3A86FF;
      color: white;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #map {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    /* 하단 패널 */
    .bottom-panel {
      background: white;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.12);
      padding: 16px;
      flex-shrink: 0;
    }

    .panel-handle {
      width: 40px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    /* GPS 상태 */
    .gps-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }
    .gps-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .gps-dot.active { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
    .gps-dot.error { background: #ef4444; }

    /* 코멘트 입력 */
    .comment-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    #commentInput {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #commentInput:focus { border-color: #3A86FF; }

    /* 버튼들 */
    .btn-row { display: flex; gap: 10px; }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #3A86FF; color: white; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* 숨겨진 input */
    #fileInput { display: none; }

    /* 사진 목록 */
    .photo-list {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .photo-list:empty::before {
      content: '사진을 찍으면 여기에 표시됩니다';
      color: #aaa;
      font-size: 13px;
      white-space: nowrap;
    }
    .photo-thumb {
      position: relative;
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .photo-thumb:hover { border-color: #3A86FF; }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb .del-btn {
      position: absolute;
      top: 2px;
      right: 2px;
      background: rgba(0,0,0,0.55);
      color: white;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 11px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .photo-thumb:hover .del-btn { display: flex; }

    /* 오버레이 모달 */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.show { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      max-width: 380px;
      width: 100%;
    }
    .modal img { width: 100%; max-height: 280px; object-fit: cover; }
    .modal-info { padding: 16px; }
    .modal-comment { font-size: 15px; color: #1e293b; margin-bottom: 8px; }
    .modal-meta { font-size: 12px; color: #94a3b8; margin-bottom: 14px; }
    .modal-close {
      width: 100%;
      padding: 12px;
      background: #f1f5f9;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      color: #475569;
    }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      color: white;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 9998;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>📍 Photo Map</header>

<div id="map"></div>

<div class="bottom-panel">
  <div class="panel-handle"></div>

  <div class="gps-bar">
    <div class="gps-dot" id="gpsDot"></div>
    <span id="gpsText">위치 가져오는 중...</span>
  </div>

  <div class="comment-row">
    <input type="text" id="commentInput" placeholder="코멘트 입력 (선택사항)" maxlength="100">
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" id="galleryBtn" onclick="document.getElementById('fileInput').click()">
      🖼️ 갤러리
    </button>
    <button class="btn btn-primary" id="cameraBtn" onclick="openCamera()" disabled>
      📷 사진 찍기
    </button>
  </div>

  <input type="file" id="fileInput" accept="image/*" capture="environment">

  <div class="photo-list" id="photoList"></div>
</div>

<!-- 사진 상세 모달 -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <img id="modalImg" src="" alt="">
    <div class="modal-info">
      <div class="modal-comment" id="modalComment"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <button class="modal-close" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 카카오맵 SDK: YOUR_KAKAO_APP_KEY 를 발급받은 JavaScript 키로 교체하세요 -->
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_APP_KEY&libraries=services"></script>

<script>
  let map, currentLat, currentLng;
  const markers = {};

  // ── 지도 초기화 ──────────────────────────────────────────────
  function initMap() {
    const container = document.getElementById('map');
    const options = {
      center: new kakao.maps.LatLng(37.5665, 126.9780), // 서울 기본
      level: 5
    };
    map = new kakao.maps.Map(container, options);
  }

  // ── GPS ──────────────────────────────────────────────────────
  function startGPS() {
    if (!navigator.geolocation) {
      setGpsStatus('error', 'GPS를 지원하지 않는 브라우저입니다');
      return;
    }
    navigator.geolocation.watchPosition(
      (pos) => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        setGpsStatus('active', `위도 ${currentLat.toFixed(5)}, 경도 ${currentLng.toFixed(5)}`);
        document.getElementById('cameraBtn').disabled = false;
        if (map) map.setCenter(new kakao.maps.LatLng(currentLat, currentLng));
      },
      (err) => {
        setGpsStatus('error', '위치 접근 거부됨 — 브라우저 설정을 확인하세요');
      },
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
  }

  function setGpsStatus(state, text) {
    const dot = document.getElementById('gpsDot');
    dot.className = 'gps-dot ' + state;
    document.getElementById('gpsText').textContent = text;
  }

  // ── 카메라 / 갤러리 ───────────────────────────────────────────
  function openCamera() {
    const input = document.getElementById('fileInput');
    input.setAttribute('capture', 'environment');
    input.click();
  }

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!currentLat || !currentLng) {
      showToast('GPS 위치를 먼저 가져와야 합니다');
      return;
    }

    const comment = document.getElementById('commentInput').value.trim();
    const btn = document.getElementById('cameraBtn');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    try {
      const formData = new FormData();
      formData.append('photo', file);
      formData.append('lat', currentLat);
      formData.append('lng', currentLng);
      formData.append('comment', comment);

      const res = await fetch('/api/photos', { method: 'POST', body: formData });
      if (!res.ok) throw new Error('서버 오류');
      const photo = await res.json();

      addPhotoToUI(photo);
      addMarkerToMap(photo);
      document.getElementById('commentInput').value = '';
      showToast('사진이 저장됐습니다 ✅');
    } catch (err) {
      showToast('저장 실패: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '📷 사진 찍기';
      e.target.value = '';
    }
  });

  // ── 마커 ─────────────────────────────────────────────────────
  function addMarkerToMap(photo) {
    const pos = new kakao.maps.LatLng(photo.lat, photo.lng);

    // 커스텀 마커 (썸네일 이미지)
    const content = `
      <div style="
        width:52px; height:52px; border-radius:10px; overflow:hidden;
        border:3px solid #3A86FF; box-shadow:0 2px 8px rgba(0,0,0,0.25);
        cursor:pointer; background:#fff;
      " onclick="openModal('${photo.id}')">
        <img src="${photo.url}" style="width:100%;height:100%;object-fit:cover">
      </div>`;

    const overlay = new kakao.maps.CustomOverlay({ position: pos, content, yAnchor: 1 });
    overlay.setMap(map);
    markers[photo.id] = overlay;
  }

  // ── 사진 목록 UI ──────────────────────────────────────────────
  function addPhotoToUI(photo) {
    const list = document.getElementById('photoList');
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.dataset.id = photo.id;
    div.innerHTML = `
      <img src="${photo.url}" alt="" onclick="openModal('${photo.id}')">
      <button class="del-btn" onclick="deletePhoto('${photo.id}', event)">✕</button>`;
    list.prepend(div);
  }

  // ── 모달 ─────────────────────────────────────────────────────
  let allPhotos = [];

  function openModal(id) {
    const photo = allPhotos.find(p => p.id === id);
    if (!photo) return;

    document.getElementById('modalImg').src = photo.url;
    document.getElementById('modalComment').textContent = photo.comment || '(코멘트 없음)';
    document.getElementById('modalMeta').textContent =
      `📍 ${photo.lat.toFixed(5)}, ${photo.lng.toFixed(5)}  ·  ${new Date(photo.createdAt).toLocaleString('ko-KR')}`;

    document.getElementById('overlay').classList.add('show');

    // 지도를 해당 위치로 이동
    if (map) map.setCenter(new kakao.maps.LatLng(photo.lat, photo.lng));
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('show');
  }

  function closeOverlay(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  // ── 삭제 ─────────────────────────────────────────────────────
  async function deletePhoto(id, e) {
    e.stopPropagation();
    if (!confirm('이 사진을 삭제할까요?')) return;

    const res = await fetch(`/api/photos/${id}`, { method: 'DELETE' });
    if (!res.ok) { showToast('삭제 실패'); return; }

    document.querySelector(`.photo-thumb[data-id="${id}"]`)?.remove();
    if (markers[id]) { markers[id].setMap(null); delete markers[id]; }
    allPhotos = allPhotos.filter(p => p.id !== id);
    showToast('삭제됐습니다');
  }

  // ── 토스트 ───────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── 초기 데이터 로드 ──────────────────────────────────────────
  async function loadPhotos() {
    const res = await fetch('/api/photos');
    allPhotos = await res.json();
    allPhotos.forEach(photo => {
      addPhotoToUI(photo);
      addMarkerToMap(photo);
    });
  }

  // ── 앱 시작 ───────────────────────────────────────────────────
  kakao.maps.load(() => {
    initMap();
    startGPS();
    loadPhotos();
  });
</script>

</body>
</html>
